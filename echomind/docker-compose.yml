# EchoMind 2.0 - Docker Compose 编排
# 包含 EchoMind App + Redis 缓存服务

version: "3.8"

services:
  # ---------- EchoMind 核心服务 ----------
  echomind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echomind-agent
    ports:
      - "8000:8000"
    environment:
      # 阿里云 DashScope (LLM)
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      # DashVector (向量数据库) - 可选
      - DASHVECTOR_API_KEY=${DASHVECTOR_API_KEY:-}
      - DASHVECTOR_ENDPOINT=${DASHVECTOR_ENDPOINT:-}
      # 运行模式
      - DEBUG=${DEBUG:-false}
      - USE_LOCAL_FALLBACK=${USE_LOCAL_FALLBACK:-true}
    volumes:
      # 持久化本地数据（SQLite 等）
      - echomind_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - echomind_network

  # ---------- Redis (可选，用于生产环境的短期记忆存储) ----------
  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echomind_network
    profiles:
      - production  # 仅在 production profile 下启动

# ---------- 数据卷 ----------
volumes:
  echomind_data:
    name: echomind_data
  redis_data:
    name: echomind_redis_data

# ---------- 网络 ----------
networks:
  echomind_network:
    name: echomind_network
    driver: bridge